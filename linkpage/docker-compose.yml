# Self-contained deployment for the link-page app on its own VPS: the API/SPA
# server, its own Postgres, and a one-shot migration step. It talks to GigBuddy
# only over HTTPS (GIGBUDDY_URL) — nothing here connects to GigBuddy's database.
#
#   cp .env.example .env   # fill GIGBUDDY_URL, GIGBUDDY_SYNC_SECRET,
#                          #   LINKPAGE_PUBLIC_URL, POSTGRES_PASSWORD, ...
#   docker compose up -d --build
#
# The app listens on 127.0.0.1:3010 — put a TLS-terminating reverse proxy
# (Caddy / nginx / Traefik) in front for link.<your-domain>, and make sure it
# forwards a country header (cf-ipcountry / x-vercel-ip-country / …) if you want
# the country dimension in statistics.

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-linkpage}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-gigbuddy_linkpage}
    volumes:
      - linkpage-db:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-linkpage} -d ${POSTGRES_DB:-gigbuddy_linkpage}']
      interval: 10s
      timeout: 5s
      retries: 5

  # Runs the SQL migrations once, then exits. `app` waits for it to succeed.
  migrate:
    build: .
    command: ['node', 'server/migrate.js']
    restart: 'no'
    env_file: .env
    environment:
      LINKPAGE_DATABASE_URL: postgres://${POSTGRES_USER:-linkpage}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-gigbuddy_linkpage}
    depends_on:
      db:
        condition: service_healthy

  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      LINKPAGE_DATABASE_URL: postgres://${POSTGRES_USER:-linkpage}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-gigbuddy_linkpage}
      LINKPAGE_PORT: 3010
    ports:
      - '127.0.0.1:3010:3010'
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O /dev/null http://localhost:3010/api/health || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  linkpage-db:
