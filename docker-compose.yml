services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PGDATABASE}
      POSTGRES_USER: ${PGUSER}
      POSTGRES_PASSWORD: ${PGPASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER} -d ${PGDATABASE}"]
      interval: 5s
      timeout: 5s
      retries: 5

  rustfs_perms:
    image: busybox
    user: root
    volumes:
      - rustfs_data:/data
    command: chown -R 10001:10001 /data
    restart: "no"

  rustfs:
    image: rustfs/rustfs:latest
    command: /data
    restart: unless-stopped
    depends_on:
      rustfs_perms:
        condition: service_completed_successfully
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY}
      RUSTFS_CONSOLE_ENABLE: "true"
    ports:
      # 9000 bound to 127.0.0.1 only — reachable from the host for local dev,
      # but not exposed externally on the VPS. The app container uses the internal
      # Docker network (rustfs:9000) and ignores this binding.
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - rustfs_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9000/health > /dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 40s

  rustfs_init:
    image: minio/mc:latest
    depends_on:
      rustfs:
        condition: service_healthy
    env_file: .env
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://rustfs:9000 $${RUSTFS_ACCESS_KEY} $${RUSTFS_SECRET_KEY};
        mc mb --ignore-existing local/$${RUSTFS_BUCKET};
        exit 0
      "
    restart: "no"

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3002:3002"
    env_file: .env
    environment:
      RUSTFS_ENDPOINT: rustfs
    depends_on:
      postgres:
        condition: service_healthy
      rustfs:
        condition: service_healthy

  migrate:
    build: .
    command: node server/db/migrate.js
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

volumes:
  postgres_data:
  rustfs_data:
