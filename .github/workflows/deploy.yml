name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Git pull origin main
        timeout-minutes: 1
        uses: appleboy/ssh-action@v1.0.3 # 029f5b4aeeeb58fdfe1410a5d17f967dacf36262
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/gigbuddy
            git pull origin main
      - name: Build and deploy Docker containers
        uses: appleboy/ssh-action@v1.0.3 # 029f5b4aeeeb58fdfe1410a5d17f967dacf36262
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/gigbuddy
            umask 077
            cat > .env <<'EOF'
            PGHOST=postgres
            PGDATABASE=${{ secrets.PGDATABASE }}
            PGUSER=${{ secrets.PGUSER }}
            PGPASSWORD=${{ secrets.PGPASSWORD }}
            PGPORT=5432
            SERVER_PORT=3002
            CLIENT_ORIGIN=${{ secrets.CLIENT_ORIGIN }}
            SESSION_SECRET=${{ secrets.SESSION_SECRET }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            OIDC_REDIRECT_URI=${{ secrets.OIDC_REDIRECT_URI }}
            MICROSOFT_CLIENT_ID=${{ secrets.MICROSOFT_CLIENT_ID }}
            MICROSOFT_CLIENT_SECRET=${{ secrets.MICROSOFT_CLIENT_SECRET }}
            MICROSOFT_REDIRECT_URI=${{ secrets.MICROSOFT_REDIRECT_URI }}
            APP_URL=${{ secrets.APP_URL }}
            ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
            VAPID_PUBLIC_KEY=${{ secrets.VAPID_PUBLIC_KEY }}
            VAPID_PRIVATE_KEY=${{ secrets.VAPID_PRIVATE_KEY }}
            VAPID_SUBJECT=${{ secrets.VAPID_SUBJECT }}
            RUSTFS_ACCESS_KEY=${{ secrets.RUSTFS_ACCESS_KEY }}
            RUSTFS_SECRET_KEY=${{ secrets.RUSTFS_SECRET_KEY }}
            RUSTFS_BUCKET=${{ secrets.RUSTFS_BUCKET }}
            RUSTFS_PORT=${{ secrets.RUSTFS_PORT }}
            RUSTFS_USE_SSL=${{ secrets.RUSTFS_USE_SSL }}
            INTEGRATION_SECRETS_KEYS=${{ secrets.INTEGRATION_SECRETS_KEYS }}
            INTEGRATION_SECRETS_ACTIVE_KEY_ID=${{ secrets.INTEGRATION_SECRETS_ACTIVE_KEY_ID }}
            NODE_ENV=production
            # info (not warn) so http.request + info lines actually reach
            # stdout and get shipped to Loki. At warn the app emits almost
            # nothing; lower to warn only if log volume/cost becomes an issue.
            LOG_LEVEL=info
            # Grafana Cloud observability (shipped by the alloy service).
            GCLOUD_HOSTED_METRICS_URL=${{ secrets.GCLOUD_HOSTED_METRICS_URL }}
            GCLOUD_HOSTED_METRICS_ID=${{ secrets.GCLOUD_HOSTED_METRICS_ID }}
            GCLOUD_HOSTED_LOGS_URL=${{ secrets.GCLOUD_HOSTED_LOGS_URL }}
            GCLOUD_HOSTED_LOGS_ID=${{ secrets.GCLOUD_HOSTED_LOGS_ID }}
            GCLOUD_RW_API_KEY=${{ secrets.GCLOUD_RW_API_KEY }}
            GCLOUD_SCRAPE_INTERVAL=60s
            EOF
            chmod 600 .env
            docker compose build
            # Start the observability agent first so it is already discovering
            # containers before the rest of the stack comes up. (One-shot
            # containers like `migrate` are short-lived; their logs are
            # best-effort — Docker log discovery may miss a container that
            # exits within its refresh window.)
            docker compose --profile observability up -d alloy
            docker compose up -d postgres rustfs rustfs_init
            docker compose run --rm migrate
            docker compose up -d app
            docker compose run --rm app node server/scripts/migrateIntegrationSecrets.js --check
            docker compose run --rm app node server/scripts/migrateIntegrationSecrets.js --apply
            docker compose run --rm app node server/scripts/migrateIntegrationSecrets.js --check
  
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: gigbuddy
          POSTGRES_PASSWORD: gigbuddy
          POSTGRES_DB: gigbuddy_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gigbuddy"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v7 # v7
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: Set up Node
        uses: actions/setup-node@v6 # v6
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Frontend tests with coverage
        run: npm run coverage
      - name: Server tests with coverage
        run: npm run coverage:server
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: gigbuddy
          PGPASSWORD: gigbuddy
          PGDATABASE: gigbuddy
          PGDATABASE_TEST: gigbuddy_test
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602 # v6.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
