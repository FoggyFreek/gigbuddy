name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Git pull origin main
        timeout-minutes: 1
        uses: appleboy/ssh-action@v1.0.3 # 029f5b4aeeeb58fdfe1410a5d17f967dacf36262
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/gigbuddy
            git pull origin main
      - name: Build and deploy Docker containers
        uses: appleboy/ssh-action@v1.0.3 # 029f5b4aeeeb58fdfe1410a5d17f967dacf36262
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/gigbuddy  
            cat > .env <<'EOF'
            PGHOST=postgres
            PGDATABASE=${{ secrets.PGDATABASE }}
            PGUSER=${{ secrets.PGUSER }}
            PGPASSWORD=${{ secrets.PGPASSWORD }}
            PGPORT=5432
            SERVER_PORT=3002
            CLIENT_ORIGIN=${{ secrets.CLIENT_ORIGIN }}
            SESSION_SECRET=${{ secrets.SESSION_SECRET }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            OIDC_REDIRECT_URI=${{ secrets.OIDC_REDIRECT_URI }}
            APP_URL=${{ secrets.APP_URL }}
            ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
            VAPID_PUBLIC_KEY=${{ secrets.VAPID_PUBLIC_KEY }}
            VAPID_PRIVATE_KEY=${{ secrets.VAPID_PRIVATE_KEY }}
            VAPID_SUBJECT=${{ secrets.VAPID_SUBJECT }}
            RUSTFS_ACCESS_KEY=${{ secrets.RUSTFS_ACCESS_KEY }}
            RUSTFS_SECRET_KEY=${{ secrets.RUSTFS_SECRET_KEY }}
            RUSTFS_BUCKET=${{ secrets.RUSTFS_BUCKET }}
            RUSTFS_PORT=${{ secrets.RUSTFS_PORT }}
            RUSTFS_USE_SSL=${{ secrets.RUSTFS_USE_SSL }}
            NODE_ENV=production
            EOF
            docker compose build
            docker compose up -d postgres rustfs rustfs_init
            docker compose run --rm migrate
            docker compose up -d app
  
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: gigbuddy
          POSTGRES_PASSWORD: gigbuddy
          POSTGRES_DB: gigbuddy_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gigbuddy"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: Set up Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Frontend tests with coverage
        run: npm run coverage
      - name: Server tests with coverage
        run: npm run coverage:server
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: gigbuddy
          PGPASSWORD: gigbuddy
          PGDATABASE: gigbuddy
          PGDATABASE_TEST: gigbuddy_test
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602 # v6.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
