name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/gigbuddy
            git pull origin main
            cat > .env <<'EOF'
            PGHOST=postgres
            PGDATABASE=${{ secrets.PGDATABASE }}
            PGUSER=${{ secrets.PGUSER }}
            PGPASSWORD=${{ secrets.PGPASSWORD }}
            PGPORT=5432
            SERVER_PORT=3002
            CLIENT_ORIGIN=${{ secrets.CLIENT_ORIGIN }}
            SESSION_SECRET=${{ secrets.SESSION_SECRET }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            OIDC_REDIRECT_URI=${{ secrets.OIDC_REDIRECT_URI }}
            APP_URL=${{ secrets.APP_URL }}
            ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
            VAPID_PUBLIC_KEY=${{ secrets.VAPID_PUBLIC_KEY }}
            VAPID_PRIVATE_KEY=${{ secrets.VAPID_PRIVATE_KEY }}
            VAPID_SUBJECT=${{ secrets.VAPID_SUBJECT }}
            RUSTFS_ACCESS_KEY=${{ secrets.RUSTFS_ACCESS_KEY }}
            RUSTFS_SECRET_KEY=${{ secrets.RUSTFS_SECRET_KEY }}
            RUSTFS_BUCKET=${{ secrets.RUSTFS_BUCKET }}
            RUSTFS_PORT=${{ secrets.RUSTFS_PORT }}
            RUSTFS_USE_SSL=${{ secrets.RUSTFS_USE_SSL }}
            NODE_ENV=production
            EOF
            docker compose build
            docker compose up -d postgres rustfs rustfs_init
            docker compose run --rm migrate
            docker compose up -d app
