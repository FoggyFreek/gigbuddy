sonar.projectKey=FoggyFreek_gigbuddy
sonar.organization=foggyfreek

# Path to sources
sonar.sources=src,server,public

# Exclude build output, dependencies, and generated files
# Note: wildcard patterns are not supported in automatic analysis; use bare directory/file paths
sonar.exclusions=node_modules,dist,coverage,public/icons,public/manifest.json,src/tests/**,server/db/migrations/**

# Path to tests
sonar.tests=src/tests

# Exclude server test harness helpers (not test suites) and the Vitest setup file
sonar.test.exclusions=src/tests/server/_app.js,src/tests/server/_db.js,src/tests/server/_envSetup.js,src/tests/setup.js

# Source encoding
sonar.sourceEncoding=UTF-8

# Exclusions for copy-paste detection (tests, SQL migrations, and icon components are legitimately repetitive)
sonar.cpd.exclusions=src/tests,server/db/migrations,src/components/icons
